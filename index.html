<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Augustin Bresset — Data Scientist & Engineer">
  <title>Augustin Bresset</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=EB+Garamond:ital,wght@0,400;1,400&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">

  <!-- Three.js via importmap — vendored locally, no build step, offline-safe -->
  <script type="importmap">
    {
      "imports": {
        "three": "./vendor/three.module.js",
        "three/addons/": "./vendor/addons/"
      }
    }
  </script>
</head>
<body>

  <!-- Three.js renders into this div -->
  <div id="viewport"></div>

  <!-- painterly overlay: paper tooth + fine grain + vignette (purely decorative) -->
  <div id="paper" aria-hidden="true"></div>
  <div id="grain" aria-hidden="true"></div>
  <div id="vignette" aria-hidden="true"></div>

  <!-- UI overlay (sits on top of canvas) -->
  <div id="ui">
    <button id="back-btn" class="ui-btn" style="display:none">
      <svg width="16" height="16" viewBox="0 0 16 16" fill="none" aria-hidden="true">
        <polyline points="10,2 4,8 10,14" stroke="currentColor" stroke-width="1.8" fill="none"/>
      </svg>
      <span data-key="back">Back</span>
    </button>
    <button id="theme-btn" class="ui-btn ui-btn--theme" title="Change world">Island</button>
    <button id="lang-btn" class="ui-btn ui-btn--lang">FR</button>
  </div>

  <div id="hint" class="ui-hint"><span data-key="hint">Click a settlement to explore</span></div>

  <!-- Clickable legend of settlements (populated by ui.js) -->
  <nav id="legend" class="legend" aria-label="Settlements"></nav>

  <!-- Field note: a small parchment slip pinned beside the clicked landmark -->
  <aside id="note-card" class="note-card hidden" role="dialog" aria-label="Landmark note">
    <button id="note-close" class="note-close" aria-label="Close">✕</button>
    <div id="note-body"></div>
  </aside>

  <script type="module" src="script.js"></script>
</body>
</html>
